services:
  # Contenedor init: genera la CA y los certificados del servidor LDAP si no existen,
  # y los almacena en un named volume con permisos Unix correctos.
  # Compatible con Windows y Linux. No requiere archivos PKI en el repositorio.
  cert-init:
    image: alpine:3.19
    volumes:
      - ldap_certs:/certs
    command:
      - sh
      - -c
      - |
        if [ -f /certs/ca-cert.pem ] && [ -f /certs/ldap-cert.pem ] && [ -f /certs/ldap-key.pem ]; then
          echo 'Certificados ya existentes, omitiendo generacion.'; exit 0;
        fi
        apk add --no-cache openssl
        echo '==> Generando CA...'
        openssl genrsa -out /certs/ca-key.pem 4096
        openssl req -x509 -new -nodes -key /certs/ca-key.pem -sha256 -days 3650 -out /certs/ca-cert.pem -subj '/C=CL/ST=Santiago/L=Santiago/O=MiOrg/OU=Seguridad/CN=Mi CA Interna'
        echo '==> Generando certificado del servidor LDAP...'
        openssl genrsa -out /certs/ldap-key.pem 2048
        openssl req -new -key /certs/ldap-key.pem -out /certs/ldap.csr -subj '/C=CL/ST=Santiago/L=Santiago/O=MiOrg/OU=Infraestructura/CN=openldap'
        printf 'subjectAltName=DNS:openldap,DNS:localhost,IP:127.0.0.1' > /certs/san.ext
        openssl x509 -req -in /certs/ldap.csr -CA /certs/ca-cert.pem -CAkey /certs/ca-key.pem -CAcreateserial -out /certs/ldap-cert.pem -days 825 -sha256 -extfile /certs/san.ext
        chmod 644 /certs/ca-cert.pem /certs/ldap-cert.pem
        chmod 600 /certs/ldap-key.pem /certs/ca-key.pem
        chown 911:911 /certs/ldap-key.pem
        echo '==> Certificados generados correctamente.'

  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    hostname: openldap
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LDAP_TLS: "true"
      LDAP_TLS_VERIFY_CLIENT: "try"
      LDAP_TLS_CA_CRT_FILENAME: ca-cert.pem
      LDAP_TLS_CRT_FILENAME: ldap-cert.pem
      LDAP_TLS_KEY_FILENAME: ldap-key.pem
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ldap_certs:/container/service/slapd/assets/certs
    depends_on:
      cert-init:
        condition: service_completed_successfully
    networks:
      - ldap_network

  app:
    build: ./app
    container_name: crud_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "5000:5000"
    volumes:
      - ldap_certs:/app/certs:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
      openldap:
        condition: service_started
    networks:
      - ldap_network

volumes:
  ldap_data:
  ldap_config:
  ldap_certs:

networks:
  ldap_network:
    driver: bridge
